name: "🔄 Real-Time Sync Issue"
description: "Something isn't syncing correctly between devices or tabs"
title: "[Sync]: "
labels: ["bug", "sync"]
body:
  - type: dropdown
    id: sync-area
    attributes:
      label: "What isn't syncing?"
      multiple: true
      options:
        - "Speaker queue"
        - "Speaker order"
        - "Timer state"
        - "Shared Notes"
        - "Member count / presence"
        - "Public room listing"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Describe the sync problem"
      description: "What did you see on each device/tab? How were you testing (same browser, different devices, etc.)?"
      placeholder: |
        Example: "Two tabs open in Chrome, same room. Tab A shows the timer running 
        but Tab B is stuck on 5:00 and never started."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Screenshots or extra context"
      description: "Side-by-side screenshots, console errors, browser info — anything that helps."
      placeholder: "Drag and drop images here, or add any extra details."
    validations:
      required: false
