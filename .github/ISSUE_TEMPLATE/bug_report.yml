name: "🐛 Bug Report"
description: "Something isn't working correctly in Lightning Ladder"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Which part of the app is affected?"
      options:
        - "Lobby / Home Screen"
        - "Room Creation"
        - "Join by Code / Join by Link"
        - "Speaker Queue"
        - "Timer"
        - "Drag-and-Drop Reorder"
        - "Shared Notes"
        - "Room Bar"
        - "Public Room Listing"
        - "Presence / Member Count"
        - "Theme Toggle"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "Describe the bug — what you did, what went wrong, and what you expected instead."
      placeholder: |
        Example: "I joined a room by code, but my name never showed up in the speaker 
        queue on the other person's screen."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or extra context"
      description: "Screenshots, console errors, browser/device info — anything that helps."
      placeholder: "Drag and drop images here, or add any extra details."
    validations:
      required: false
