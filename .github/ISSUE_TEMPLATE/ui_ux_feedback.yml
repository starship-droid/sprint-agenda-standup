name: "🎨 UI/UX Feedback"
description: "Something looks off, feels clunky, or could be improved visually"
title: "[UI/UX]: "
labels: ["ui/ux"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Which part of the app?"
      options:
        - "Lobby / Home Screen"
        - "Room Creation"
        - "Speaker Queue / Roster"
        - "Timer Panel"
        - "Shared Notes"
        - "Room Bar"
        - "Header / Footer"
        - "Theme / Colors"
        - "Mobile Layout"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "What's the issue or suggestion?"
      description: "What looks off, feels clunky, or could be better? Include device/browser if relevant."
      placeholder: |
        Example: "On iPhone, the speaker list overlaps the timer when there are 
        more than 5 people. It should scroll instead."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or extra context"
      description: "A picture goes a long way — drag and drop if you can!"
      placeholder: "Drag and drop images here, or add any extra details."
    validations:
      required: false
