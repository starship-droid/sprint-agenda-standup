name: "✨ Feature Request"
description: "Suggest a new feature or improvement for Lightning Ladder"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Which area does this relate to?"
      options:
        - "Lobby / Home Screen"
        - "Room Creation & Settings"
        - "Speaker Queue"
        - "Timer"
        - "Shared Notes"
        - "Room Bar / Sharing"
        - "Themes / Visual Design"
        - "Mobile Experience"
        - "Accessibility"
        - "New Feature Area"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "What would you like and why?"
      description: "Describe the feature or improvement and the problem it would solve."
      placeholder: |
        Example: "It would be great to see a total session time estimate so I know 
        how long the standup will take with 10 speakers."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Screenshots, mockups, or extra context"
      description: "Sketches, links to examples from other tools, or any other details."
      placeholder: "Drag and drop images here, or add any extra details."
    validations:
      required: false
